<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Emerald | Haven, The Awakening Doula</title>
  <style>
    /* ─────────────────────────────────────────
       SUNSET DESIGN SYSTEM
    ───────────────────────────────────────── */
    :root {
      --bg:          #FDF0E8;
      --surface:     #FFF8F3;
      --primary:     #E8654A;
      --primary-dk:  #C4472F;
      --gold:        #D4A762;
      --gold-dk:     #B88840;
      --deep:        #7B3F2A;
      --text:        #2C1810;
      --muted:       #A87B6E;
      --border:      #F0D9CA;
      --ai-bubble:   #FFF3EC;
      --user-bubble: #E8654A;
      --glow:        rgba(212, 167, 98, 0.20);
      --shadow:      rgba(123, 63, 42, 0.10);

      /* Typography */
      --font-serif:  'Georgia', 'Times New Roman', serif;
      --font-sans:   'Google Sans', 'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
    }

    /* ─────────────────────────────────────────
       SIDEBAR — CLIENT LIST
    ───────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }
    .sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand {
      font-family: var(--font-serif);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .sidebar-search {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      font-size: 13px;
      color: var(--text);
      outline: none;
      font-family: var(--font-sans);
    }
    .sidebar-search:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--glow);
    }
    .sidebar-search::placeholder { color: var(--muted); }
    .client-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .client-card {
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
      position: relative;
    }
    .client-card:hover { background: var(--bg); }
    .client-card.active {
      background: #FEF0E8;
      border-left-color: var(--primary);
    }
    .client-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .client-card-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-akashic   { background: #EDE7F6; color: #6B3FA0; }
    .badge-counseling{ background: #E8F5E9; color: #2E7D32; }
    .badge-soul      { background: #FFF3E0; color: #E65100; }
    .badge-active    { background: #E8F5E9; color: #2E7D32; }
    .badge-complete  { background: #F5F5F5; color: #757575; }
    .week-pill {
      font-size: 10px;
      color: var(--primary);
      font-weight: 600;
    }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .btn-new-client {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-new-client:hover { background: var(--primary-dk); }
    .sidebar-stats {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 10px;
    }

    /* ─────────────────────────────────────────
       MAIN AREA
    ───────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100dvh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      padding: 4px;
    }
    .header-gem {
      font-size: 22px;
      line-height: 1;
    }
    .header-titles { flex: 1; min-width: 0; }
    .header-name {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: normal;
      color: var(--deep);
      letter-spacing: 0.5px;
    }
    .header-subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-client-pill {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--deep);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .header-client-pill:hover { border-color: var(--gold); }
    .header-client-pill.no-client { color: var(--muted); }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      gap: 8px;
      max-width: 86%;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message-row.ai  { align-self: flex-start; }
    .message-row.user{ align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-bubble {
      padding: 11px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message-row.ai  .msg-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .message-row.user .msg-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      padding: 0 4px;
      align-self: flex-end;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: typingPulse 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* Confirm card (inline) */
    .confirm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 6px;
      max-width: 320px;
    }
    .confirm-card-text {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .confirm-card-actions {
      display: flex;
      gap: 8px;
    }
    .btn-confirm {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-confirm.yes { background: var(--primary); color: white; }
    .btn-confirm.yes:hover { background: var(--primary-dk); }
    .btn-confirm.no  { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .btn-confirm.no:hover  { border-color: var(--muted); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--deep);
      color: white;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* Quick Actions Row */
    .quick-actions {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      overflow-x: auto;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .action-chip {
      flex-shrink: 0;
      padding: 7px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--deep);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .action-chip:hover, .action-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Input Bar */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-field {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--bg);
      font-size: 14px;
      color: var(--text);
      outline: none;
      font-family: var(--font-sans);
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }
    .input-field:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--glow);
    }
    .input-field::placeholder { color: var(--muted); }
    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary-dk); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ─────────────────────────────────────────
       BOTTOM SHEET — Action Panel
    ───────────────────────────────────────── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(44, 24, 16, 0.4);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 80dvh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .sheet-header {
      padding: 14px 20px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--deep);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .sheet-content {
      overflow-y: auto;
      padding: 14px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sheet-btn {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-sans);
    }
    .sheet-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .sheet-btn.gold {
      border-color: var(--gold);
      color: var(--deep);
      font-weight: 600;
    }
    .sheet-btn.gold:hover { background: var(--gold); color: white; }

    /* Soul Emergence workbook grid */
    .workbook-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .workbook-btn {
      padding: 10px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 11px;
      color: var(--deep);
      text-align: center;
      cursor: pointer;
      line-height: 1.4;
      transition: all 0.15s;
    }
    .workbook-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .workbook-btn strong { display: block; font-size: 13px; margin-bottom: 2px; }

    /* ─────────────────────────────────────────
       EMPTY STATE
    ───────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }
    .empty-gem { font-size: 48px; opacity: 0.5; }
    .empty-title { font-family: var(--font-serif); font-size: 20px; color: var(--deep); opacity: 0.7; }
    .empty-subtitle { font-size: 13px; line-height: 1.6; max-width: 240px; }

    /* ─────────────────────────────────────────
       MOBILE RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px var(--shadow);
      }
      .sidebar.open { transform: translateX(0); }
      .header-menu-btn { display: flex; }
      .main { width: 100%; }
    }

    /* Scrollbar */
    .chat-area::-webkit-scrollbar,
    .client-list::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track,
    .client-list::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb,
    .client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- ─── CLIENT SIDEBAR ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">Haven · The Awakening Doula</div>
      <input class="sidebar-search" id="clientSearch" type="text" placeholder="Search clients..." oninput="filterClients()">
    </div>
    <div class="client-list" id="clientList">
      <!-- Skeleton placeholders -->
      <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px">
        <div class="skeleton" style="width:70%"></div>
        <div class="skeleton" style="width:50%;height:10px"></div>
      </div>
      <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px">
        <div class="skeleton" style="width:80%"></div>
        <div class="skeleton" style="width:60%;height:10px"></div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-stats" id="clientStats">Loading...</div>
      <button class="btn-new-client" onclick="openNewClientModal()">+ New Client</button>
    </div>
  </aside>

  <!-- ─── MAIN AREA ─── -->
  <div class="main">
    <!-- Header -->
    <header class="header">
      <button class="header-menu-btn" id="menuBtn" onclick="toggleSidebar()" aria-label="Open clients">
        ☰
      </button>
      <div class="header-gem">💎</div>
      <div class="header-titles">
        <div class="header-name">Emerald</div>
        <div class="header-subtitle">Haven · The Awakening Doula</div>
      </div>
      <div class="header-client-pill no-client" id="activeClientPill" onclick="toggleSidebar()">
        Select a client
      </div>
    </header>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-gem">💎</div>
        <div class="empty-title">Welcome, Carlie</div>
        <div class="empty-subtitle">Select a client from the sidebar to get started, or ask me anything.</div>
      </div>
    </div>

    <!-- Quick Actions Row -->
    <div class="quick-actions" id="quickActions">
      <div class="action-chip" onclick="openSheet('documents')">Documents</div>
      <div class="action-chip" onclick="openSheet('onboarding')">Onboarding</div>
      <div class="action-chip" onclick="openSheet('scheduling')">Schedule</div>
      <div class="action-chip" onclick="openSheet('financial')">Financial</div>
      <div class="action-chip" onclick="openSheet('emails')">Emails</div>
      <div class="action-chip" onclick="openSheet('utilities')">Utilities</div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
      <textarea
        class="input-field"
        id="chatInput"
        placeholder="Ask Emerald anything..."
        rows="1"
        onkeydown="handleInputKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- ─── SHEET OVERLAY ─── -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

  <!-- ─── BOTTOM SHEET ─── -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header" id="sheetTitle">Actions</div>
    <div class="sheet-content" id="sheetContent"></div>
  </div>

  <!-- ─── TOAST ─── -->
  <div class="toast" id="toast"></div>

  <script>
    /* ═══════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════ */
    const state = {
      clients: [],
      activeClient: null,
      conversationHistory: [],
      isLoading: false,
      webAppUrl: '' // Set automatically — same script
    };

    const SESSION_NAMES = {
      1:'The Threshold', 2:'Akashic Records Reading', 3:'Integration & Intention',
      4:'Akashic Clearing', 5:'Befriending Your Nervous System', 6:'Parts Work Integration',
      7:'Timeline Therapy & Reprocessing', 8:'Clearing Old Programming', 9:'Honoring What Was',
      10:'Releasing Expectations & Ritual Goodbye', 11:'Final Akashic Clearing', 12:'Emergence & Integration'
    };


    /* ═══════════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', () => {
      // Get the web app URL from the page URL
      state.webAppUrl = window.location.href.split('?')[0];
      loadClients();
      restoreSession();
    });

    async function loadClients() {
      try {
        const data = await apiCall({ action: 'getClients' });
        state.clients = data || [];
        renderClientList(state.clients);
        updateStats();
      } catch (e) {
        document.getElementById('clientList').innerHTML =
          '<div style="padding:16px;font-size:12px;color:var(--muted)">Couldn\'t load clients. Please refresh.</div>';
      }
    }

    async function restoreSession() {
      try {
        const mem = await apiCall({ action: 'getMemory' });
        if (mem && mem.lastClient) {
          const client = state.clients.find(c => c.name === mem.lastClient);
          if (client) selectClient(client, false);
        }
      } catch (_) {}

      // Welcome message
      if (!state.activeClient) {
        appendAIMessage('Good ' + getTimeGreeting() + ', Carlie. Select a client from the sidebar to get started, or ask me anything about your practice.');
      }
    }

    function getTimeGreeting() {
      const h = new Date().getHours();
      if (h < 12) return 'morning';
      if (h < 17) return 'afternoon';
      return 'evening';
    }


    /* ═══════════════════════════════════════════════
       CLIENT LIST
    ═══════════════════════════════════════════════ */
    function renderClientList(clients) {
      const list = document.getElementById('clientList');
      if (!clients.length) {
        list.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--muted);text-align:center">No clients yet.<br>Create your first client below.</div>';
        return;
      }
      list.innerHTML = clients.map(c => clientCardHTML(c)).join('');
    }

    function clientCardHTML(c) {
      const typeClass = c.clientType && c.clientType.toLowerCase().includes('akashic') ? 'badge-akashic'
                      : c.clientType && c.clientType.toLowerCase().includes('counsel') ? 'badge-counseling'
                      : 'badge-soul';
      const typeLabel = c.clientType && c.clientType.toLowerCase().includes('akashic') ? 'Akashic'
                      : c.clientType && c.clientType.toLowerCase().includes('counsel') ? 'Counseling'
                      : 'Soul Emergence';
      const statusClass = c.status === 'Active' ? 'badge-active' : 'badge-complete';
      const weekText = c.currentWeek ? `<span class="week-pill">· Wk ${c.currentWeek}</span>` : '';
      const isActive = state.activeClient && state.activeClient.name === c.name;

      return `<div class="client-card ${isActive ? 'active' : ''}" onclick="selectClientByName('${escHtml(c.name)}')">
        <div class="client-card-name">${escHtml(c.name)}</div>
        <div class="client-card-meta">
          <span class="badge ${typeClass}">${typeLabel}</span>
          <span class="badge ${statusClass}">${c.status}</span>
          ${weekText}
        </div>
      </div>`;
    }

    function filterClients() {
      const q = document.getElementById('clientSearch').value.toLowerCase();
      const filtered = state.clients.filter(c => c.name.toLowerCase().includes(q));
      renderClientList(filtered);
    }

    function updateStats() {
      const active = state.clients.filter(c => c.status === 'Active').length;
      const complete = state.clients.filter(c => c.status !== 'Active').length;
      document.getElementById('clientStats').textContent =
        active + ' active · ' + complete + ' complete';
    }

    function selectClientByName(name) {
      const client = state.clients.find(c => c.name === name);
      if (client) selectClient(client);
    }

    async function selectClient(client, sendGreeting = true) {
      state.activeClient = client;

      // Update UI
      document.getElementById('activeClientPill').textContent = client.name;
      document.getElementById('activeClientPill').classList.remove('no-client');
      renderClientList(state.clients); // re-render to update active state
      document.getElementById('emptyState') && (document.getElementById('emptyState').remove());

      // Close sidebar on mobile
      if (window.innerWidth <= 680) closeSidebar();

      if (sendGreeting) {
        const typeLabel = client.clientType && client.clientType.toLowerCase().includes('soul')
          ? `Soul Emergence (Week ${client.currentWeek || 1} of 12)`
          : (client.clientType || client.serviceType || 'client');
        appendAIMessage(
          `Switched to ${client.name} — ${typeLabel}.\n\nWhat would you like to do?`
        );
      }
    }


    /* ═══════════════════════════════════════════════
       SIDEBAR TOGGLE (mobile)
    ═══════════════════════════════════════════════ */
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }


    /* ═══════════════════════════════════════════════
       CHAT
    ═══════════════════════════════════════════════ */
    function handleInputKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || state.isLoading) return;

      input.value = '';
      input.style.height = 'auto';

      appendUserMessage(text);
      showTyping();

      state.isLoading = true;

      try {
        const result = await apiCall({
          action: 'chat',
          message: text,
          clientName: state.activeClient ? state.activeClient.name : null,
          history: state.conversationHistory.slice(-20)
        });

        hideTyping();

        if (result && result.reply) {
          appendAIMessage(result.reply);
          state.conversationHistory.push(
            { role: 'user', content: text },
            { role: 'assistant', content: result.reply }
          );

          // Refresh client data if actions were taken
          if (result.actions && result.actions.length > 0) {
            loadClients();
          }
        } else {
          appendAIMessage('Something went wrong. Please try again.');
        }

      } catch (err) {
        hideTyping();
        appendAIMessage('I had trouble connecting. Please check your connection and try again.');
        console.error(err);
      }

      state.isLoading = false;
    }

    function appendUserMessage(text) {
      const time = formatTime(new Date());
      const row = document.createElement('div');
      row.className = 'message-row user';
      row.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <div class="msg-bubble">${escHtml(text)}</div>
          <div class="msg-time">${time}</div>
        </div>`;
      getChatArea().appendChild(row);
      scrollToBottom();
    }

    function appendAIMessage(text) {
      const time = formatTime(new Date());
      const row = document.createElement('div');
      row.className = 'message-row ai';
      row.innerHTML = `
        <div class="msg-avatar">💎</div>
        <div style="display:flex;flex-direction:column;gap:2px;min-width:0">
          <div class="msg-bubble">${renderMarkdown(text)}</div>
          <div class="msg-time">${time}</div>
        </div>`;
      getChatArea().appendChild(row);
      scrollToBottom();
    }

    let typingRow = null;
    function showTyping() {
      typingRow = document.createElement('div');
      typingRow.className = 'message-row ai';
      typingRow.innerHTML = `
        <div class="msg-avatar">💎</div>
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      getChatArea().appendChild(typingRow);
      scrollToBottom();
    }
    function hideTyping() {
      if (typingRow) { typingRow.remove(); typingRow = null; }
    }

    function getChatArea() {
      const area = document.getElementById('chatArea');
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();
      return area;
    }

    function scrollToBottom() {
      const area = document.getElementById('chatArea');
      setTimeout(() => area.scrollTop = area.scrollHeight, 50);
    }


    /* ═══════════════════════════════════════════════
       BOTTOM SHEET — ACTION PANELS
    ═══════════════════════════════════════════════ */
    const ACTION_SECTIONS = {
      documents: {
        title: 'Documents',
        buildFn: buildDocumentsSection
      },
      onboarding: {
        title: 'Onboarding',
        buildFn: buildOnboardingSection
      },
      scheduling: {
        title: 'Scheduling',
        buildFn: buildSchedulingSection
      },
      financial: {
        title: 'Financial',
        buildFn: buildFinancialSection
      },
      emails: {
        title: 'Emails & Marketing',
        buildFn: buildEmailsSection
      },
      utilities: {
        title: 'Utilities',
        buildFn: buildUtilitiesSection
      }
    };

    function openSheet(sectionKey) {
      const section = ACTION_SECTIONS[sectionKey];
      if (!section) return;

      document.getElementById('sheetTitle').textContent = section.title;
      document.getElementById('sheetContent').innerHTML = section.buildFn();

      document.getElementById('sheetOverlay').classList.add('open');
      document.getElementById('bottomSheet').classList.add('open');

      // Mark chip active
      document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.action-chip').forEach(c => {
        if (c.textContent.toLowerCase().includes(section.title.split(' ')[0].toLowerCase())) {
          c.classList.add('active');
        }
      });
    }

    function closeSheet() {
      document.getElementById('sheetOverlay').classList.remove('open');
      document.getElementById('bottomSheet').classList.remove('open');
      document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active'));
    }

    /* Button helpers */
    function sheetBtn(label, onclick, className) {
      const cls = className ? 'sheet-btn ' + className : 'sheet-btn';
      return `<button class="${cls}" onclick="${onclick};closeSheet()">${label}</button>`;
    }

    /* Documents section — dynamic by client type */
    function buildDocumentsSection() {
      const type = state.activeClient ? (state.activeClient.clientType || '').toLowerCase() : '';
      let html = '';

      if (type.includes('akashic')) {
        ['Session Notes','Integration Guide','Breathwork Notes','Akashic Notes','Client Summary'].forEach(d => {
          html += sheetBtn(d, `triggerAction('generate_document','${d}')`);
        });
        html += '<div style="margin-top:8px">';
        ['Intro Packet','Packet 2','Packet 3'].forEach(p => {
          html += sheetBtn(p, `triggerAction('generate_client_packet','${p}')`);
        });
        html += '</div>';

      } else if (type.includes('counsel')) {
        ['Counseling Notes','Client Homework','Client Summary'].forEach(d => {
          html += sheetBtn(d, `triggerAction('generate_document','${d}')`);
        });

      } else if (type.includes('soul') || type.includes('emergence')) {
        html += sheetBtn('Create Private Journal', "triggerAction('create_journal',null)");
        html += sheetBtn('Open Journal', "triggerAction('get_journal_url',null)");
        html += sheetBtn('Soul Emergence Summary', "triggerAction('generate_document','Soul Emergence Summary')");
        html += sheetBtn('Client Summary', "triggerAction('generate_document','Client Summary')");

        html += '<div style="font-size:11px;font-weight:700;color:var(--deep);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)">Send Weekly Workbook</div>';
        html += '<div class="workbook-grid">';
        for (let w = 1; w <= 12; w++) {
          html += `<button class="workbook-btn" onclick="triggerAction('send_workbook',${w});closeSheet()">
            <strong>Wk ${w}</strong>${SESSION_NAMES[w]}
          </button>`;
        }
        html += '</div>';

      } else {
        html = '<div style="padding:16px;font-size:13px;color:var(--muted);text-align:center">Select a client to see their documents.</div>';
      }

      return html;
    }

    function buildOnboardingSection() {
      return sheetBtn('Send Onboarding Email', "triggerAction('send_onboarding_email',null)")
           + sheetBtn('Check Intake Status', "triggerAction('check_intake_status',null)")
           + sheetBtn('Create Intake Doc', "triggerAction('create_intake_doc',null)");
    }

    function buildSchedulingSection() {
      return sheetBtn('Add Next Session to Calendar', "triggerAction('add_session',null)")
           + sheetBtn('Delete a Session', "triggerAction('delete_session',null)");
    }

    function buildFinancialSection() {
      return sheetBtn('Record Client Payment', "triggerAction('record_payment',null)")
           + sheetBtn('Send Receipt', "triggerAction('send_receipt',null)")
           + sheetBtn('Open Budget', "triggerAction('get_budget_url',null)");
    }

    function buildEmailsSection() {
      return sheetBtn('Preview Newsletter', "triggerAction('preview_newsletter',null)", 'gold')
           + sheetBtn('Send Newsletter to All Leads', "triggerAction('send_newsletter',null)")
           + sheetBtn('Send Offer to All Past Clients', "triggerAction('send_past_client_offer_all',null)")
           + sheetBtn('Send Offer to One Email', "triggerAction('send_past_client_offer_one',null)");
    }

    function buildUtilitiesSection() {
      return sheetBtn('Open Client Folder', "triggerAction('get_client_folder_url',null)")
           + sheetBtn('Refresh Dashboard', "triggerAction('refresh_dashboard',null)")
           + sheetBtn('Refresh Leads', "triggerAction('refresh_leads',null)");
    }


    /* ═══════════════════════════════════════════════
       ACTION TRIGGER
       Translates button taps → chat messages → AI
    ═══════════════════════════════════════════════ */
    function triggerAction(toolName, param) {
      if (!state.activeClient) {
        showToast('Select a client first');
        return;
      }

      const clientName = state.activeClient.name;

      const actionMessages = {
        'generate_document':          `Generate ${param} for ${clientName}`,
        'generate_client_packet':     `Generate ${param} for ${clientName}`,
        'send_workbook':              `Send Week ${param} workbook to ${clientName}`,
        'create_journal':             `Create private journal for ${clientName}`,
        'get_journal_url':            `Open ${clientName}'s journal`,
        'send_onboarding_email':      `Send onboarding email to ${clientName}`,
        'check_intake_status':        `Check intake status for ${clientName}`,
        'create_intake_doc':          `Create intake document for ${clientName}`,
        'add_session':                `Add next session to calendar for ${clientName}`,
        'delete_session':             `Delete a calendar session for ${clientName}`,
        'record_payment':             `Record payment for ${clientName}`,
        'send_receipt':               `Send receipt to ${clientName}`,
        'get_budget_url':             `Open budget`,
        'preview_newsletter':         `Preview the newsletter`,
        'send_newsletter':            `Send newsletter to all leads`,
        'send_past_client_offer_all': `Send past client offer to all past clients`,
        'send_past_client_offer_one': `Send past client offer to one email`,
        'get_client_folder_url':      `Open ${clientName}'s folder`,
        'refresh_dashboard':          `Refresh the dashboard`,
        'refresh_leads':              `Refresh leads`
      };

      const message = actionMessages[toolName] || `Run action: ${toolName}`;

      // Inject into chat input and send
      const input = document.getElementById('chatInput');
      input.value = message;
      sendMessage();
    }


    /* ═══════════════════════════════════════════════
       NEW CLIENT MODAL
    ═══════════════════════════════════════════════ */
    function openNewClientModal() {
      const name = prompt('New client name:');
      if (!name || !name.trim()) return;

      const typeInput = prompt('Client type:\n1 = Akashic\n2 = Counseling\n3 = Soul Emergence');
      const typeMap = { '1': 'Akashic', '2': 'Counseling', '3': 'Soul Emergence' };
      const type = typeMap[typeInput];
      if (!type) { alert('Invalid type. Please enter 1, 2, or 3.'); return; }

      const message = `Create a new ${type} client named ${name.trim()}`;
      const input = document.getElementById('chatInput');
      input.value = message;
      closeSidebar();
      sendMessage();
    }


    /* ═══════════════════════════════════════════════
       API
    ═══════════════════════════════════════════════ */
    async function apiCall(payload) {
      const response = await fetch(state.webAppUrl, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Content-Type': 'application/json' }
      });

      if (!response.ok) {
        throw new Error('Network error: ' + response.status);
      }

      const json = await response.json();
      if (!json.success) {
        throw new Error(json.error || 'Unknown error');
      }

      return json.data;
    }


    /* ═══════════════════════════════════════════════
       UTILITIES
    ═══════════════════════════════════════════════ */
    function showToast(message, duration = 2500) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* Very lightweight markdown → HTML for AI responses */
    function renderMarkdown(text) {
      return escHtml(text)
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:var(--border);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
        .replace(/\n/g, '<br>');
    }
  </script>
