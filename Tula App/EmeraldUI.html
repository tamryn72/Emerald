<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Willow | Haven, The Awakening Doula</title>
  <style>
    /* ─────────────────────────────────────────
       SUNSET DESIGN SYSTEM
    ───────────────────────────────────────── */
    :root {
      --bg:          #FDF0E8;
      --surface:     #FFF8F3;
      --primary:     #E8654A;
      --primary-dk:  #C4472F;
      --gold:        #D4A762;
      --gold-dk:     #B88840;
      --deep:        #7B3F2A;
      --text:        #2C1810;
      --muted:       #A87B6E;
      --border:      #F0D9CA;
      --ai-bubble:   #FFF3EC;
      --user-bubble: #E8654A;
      --glow:        rgba(212, 167, 98, 0.20);
      --shadow:      rgba(123, 63, 42, 0.10);
      --font-serif:  'Georgia', 'Times New Roman', serif;
      --font-sans:   'Google Sans', 'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
    }

    /* ─────────────────────────────────────────
       SIDEBAR
    ───────────────────────────────────────── */
    .sidebar {
      width: 250px;
      min-width: 250px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }
    .sidebar-header {
      padding: 18px 14px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand {
      font-family: var(--font-serif);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .sidebar-search {
      width: 100%;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      font-size: 13px;
      color: var(--text);
      outline: none;
      font-family: var(--font-sans);
    }
    .sidebar-search:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--glow); }
    .sidebar-search::placeholder { color: var(--muted); }

    .client-list { flex: 1; overflow-y: auto; padding: 6px 0; }

    .client-card {
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .client-card:hover { background: var(--bg); }
    .client-card.active { background: #FEF0E8; border-left-color: var(--primary); }
    .client-card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .client-card-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-akashic    { background: #EDE7F6; color: #6B3FA0; }
    .badge-counseling { background: #E8F5E9; color: #2E7D32; }
    .badge-soul       { background: #FFF3E0; color: #E65100; }
    .badge-active     { background: #E8F5E9; color: #2E7D32; }
    .badge-complete   { background: #F5F5F5; color: #757575; }
    .week-pill        { font-size: 10px; color: var(--primary); font-weight: 600; }

    .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); }
    .sidebar-stats { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 8px; }
    .btn-new-client {
      width: 100%;
      padding: 9px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-new-client:hover { background: var(--primary-dk); }

    /* ─────────────────────────────────────────
       MAIN AREA
    ───────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100dvh; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      padding: 4px;
      min-width: 32px;
      min-height: 32px;
      align-items: center;
      justify-content: center;
    }
    .header-mark { color: var(--gold); opacity: 0.6; display: flex; align-items: center; }
    .header-mark svg { display: block; }
    .header-titles { flex: 1; min-width: 0; }
    .header-name { font-family: var(--font-serif); font-size: 17px; font-weight: normal; color: var(--deep); }
    .header-subtitle { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .header-client-pill {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--deep);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .header-client-pill:hover { border-color: var(--gold); }
    .header-client-pill.no-client { color: var(--muted); }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      gap: 8px;
      max-width: 88%;
      animation: fadeIn 0.22s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

    .message-row.ai  { align-self: flex-start; }
    .message-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif);
      font-size: 13px;
      font-style: italic;
      color: white;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-bubble {
      padding: 10px 13px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.55;
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message-row.ai .msg-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .message-row.user .msg-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 2px; padding: 0 3px; align-self: flex-end; }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 4px;
      padding: 11px 13px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: typingPulse 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
      30%            { opacity: 1;   transform: scale(1); }
    }

    /* Home State */
    .home-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 24px;
      gap: 0;
      text-align: center;
      flex: 1;
    }
    .home-mark { color: var(--gold); animation: willowBreathe 6s ease-in-out infinite; margin-bottom: 16px; }
    @keyframes willowBreathe {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.58; transform: scale(1.03); }
    }
    .home-greeting { font-family: var(--font-serif); font-size: 22px; color: var(--deep); margin-bottom: 6px; }
    .home-affirmation { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 260px; margin-bottom: 32px; }
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }
    .home-grid-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 18px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }
    .home-grid-btn:active { transform: scale(0.97); }
    .home-grid-btn:hover { border-color: var(--gold); box-shadow: 0 2px 12px var(--glow); }
    .home-grid-btn .icon { font-size: 22px; line-height: 1; }
    .home-grid-btn .label { font-size: 12px; color: var(--deep); font-weight: 500; }

    /* Quick Actions Row */
    .quick-actions {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      overflow-x: auto;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .action-chip {
      flex-shrink: 0;
      padding: 6px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--deep);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .action-chip:hover, .action-chip.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }
    .action-chip.gold-chip { border-color: var(--gold); }
    .action-chip.gold-chip:hover, .action-chip.gold-chip.active {
      background: var(--gold); color: white; border-color: var(--gold);
    }

    /* Input Bar */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-field {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      font-size: 14px;
      color: var(--text);
      outline: none;
      font-family: var(--font-sans);
      resize: none;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
    }
    .input-field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--glow); }
    .input-field::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px; height: 40px;
      background: var(--primary);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary-dk); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 17px; height: 17px; fill: white; }

    .mic-btn {
      width: 40px; height: 40px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      flex-shrink: 0;
    }
    .mic-btn:hover { border-color: var(--gold); }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn svg { width: 17px; height: 17px; fill: var(--muted); }
    .mic-btn.listening { background: var(--primary); border-color: var(--primary); animation: mic-pulse 1.2s ease infinite; }
    .mic-btn.listening svg { fill: white; }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232, 101, 74, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(232, 101, 74, 0); }
    }

    /* ─────────────────────────────────────────
       BOTTOM SHEET
    ───────────────────────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(44, 24, 16, 0.4);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 78dvh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .sheet-header {
      padding: 12px 18px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--deep);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sheet-content {
      overflow-y: auto;
      padding: 14px 16px 28px;
    }

    /* Compact pill grid (flex-wrap) — replaces full-width buttons */
    .pill-section { margin-bottom: 14px; }
    .pill-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .pill-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .action-pill {
      padding: 7px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12.5px;
      color: var(--deep);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: var(--font-sans);
    }
    .action-pill:hover, .action-pill:active {
      background: var(--primary); color: white; border-color: var(--primary);
    }
    .action-pill.gold { border-color: var(--gold); font-weight: 600; }
    .action-pill.gold:hover { background: var(--gold); color: white; }
    .action-pill.disabled, .action-pill.disabled:hover {
      opacity: 0.4; cursor: default; background: var(--bg); color: var(--muted); border-color: var(--border);
    }

    /* Workbook grid (Soul Emergence) */
    .workbook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .workbook-btn {
      padding: 9px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 11px;
      color: var(--deep);
      text-align: center;
      cursor: pointer;
      line-height: 1.35;
      transition: all 0.15s;
      font-family: var(--font-sans);
    }
    .workbook-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .workbook-btn.disabled, .workbook-btn.disabled:hover {
      opacity: 0.4; cursor: default; background: var(--bg); color: var(--muted); border-color: var(--border);
    }
    .workbook-btn strong { display: block; font-size: 12px; margin-bottom: 2px; }

    /* ─────────────────────────────────────────
       MODALS
    ───────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(44, 24, 16, 0.5);
      z-index: 400;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-dialog {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 500px;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      transform: translateY(40px);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 90dvh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal-dialog { transform: translateY(0); }
    .modal-dialog.modal-lg { max-height: 80dvh; }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border); border-radius: 2px;
      margin: 10px auto 0;
    }
    .modal-header {
      display: flex; align-items: center;
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .modal-title { font-family: var(--font-serif); font-size: 17px; color: var(--deep); flex: 1; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; line-height: 1;
      padding: 4px; border-radius: 50%;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--primary); }
    .modal-body { padding: 18px 18px 12px; }
    .modal-footer {
      display: flex; gap: 10px;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--border);
    }

    /* New Client Modal Fields */
    .field-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
    .field-label:first-child { margin-top: 0; }
    .field-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      font-size: 14px;
      color: var(--text);
      outline: none;
      font-family: var(--font-sans);
    }
    .field-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--glow); }
    .field-input::placeholder { color: var(--muted); }

    .type-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .type-btn {
      flex: 1;
      min-width: 90px;
      padding: 10px 8px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      font-size: 12.5px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      font-family: var(--font-sans);
    }
    .type-btn:hover { border-color: var(--gold); }
    .type-btn.selected { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }

    /* Modal buttons */
    .modal-btn {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: var(--font-sans);
    }
    .modal-btn.primary { background: var(--primary); color: white; }
    .modal-btn.primary:hover { background: var(--primary-dk); }
    .modal-btn.secondary { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .modal-btn.secondary:hover { border-color: var(--muted); }
    .modal-btn.gold-btn { background: var(--gold); color: white; }
    .modal-btn.gold-btn:hover { background: var(--gold-dk); }

    /* Newsletter Preview */
    .newsletter-preview-frame {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      background: white;
      max-height: 52dvh;
      max-height: 52vh; /* fallback for older mobile browsers */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .newsletter-subject {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .newsletter-subject-val { font-size: 14px; color: var(--deep); margin-bottom: 14px; font-weight: 600; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%);
      background: var(--deep);
      color: white;
      padding: 9px 16px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.28s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ─────────────────────────────────────────
       MOBILE RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px var(--shadow);
      }
      .sidebar.open { transform: translateX(0); }
      .header-menu-btn { display: flex; }
      .main { width: 100%; }
    }

    /* Scrollbars */
    .chat-area::-webkit-scrollbar,
    .client-list::-webkit-scrollbar,
    .sheet-content::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-track,
    .client-list::-webkit-scrollbar-track,
    .sheet-content::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb,
    .client-list::-webkit-scrollbar-thumb,
    .sheet-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px; height: 13px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>

      <div class="home-greeting" id="homeGreeting">Good morning, Carlie</div>
      <div class="home-affirmation" id="homeAffirmation">Your presence is the medicine. Everything else flows from here.</div>
      <div class="home-grid">
        <button class="home-grid-btn" onclick="openNewClientModal()">
          <span class="icon">+</span>
          <span class="label">New Client</span>
        </button>
        <button class="home-grid-btn" onclick="homeAction('add_lead')">
          <span class="icon">&hearts;</span>
          <span class="label">Add Lead</span>
        </button>
        <button class="home-grid-btn" onclick="homeAction('add_session')">

<script>
/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  clients: [],
  activeClient: null,
  conversationHistory: [],
  isLoading: false,
  selectedClientType: null,
  templates: [],
  config: {
    sessionNames: {},
    weekCount: 12,
    practitionerName: 'Carlie',
    practiceName: 'Haven, The Awakening Doula',
    aiName: 'Willow',
    sessionDuration: 60
  }
};

// Fallback — overwritten by loadConfig() from registry
const DEFAULT_SESSION_NAMES = {
  1:'The Threshold', 2:'Akashic Records Reading', 3:'Integration & Intention',
  4:'Akashic Clearing', 5:'Befriending Your Nervous System', 6:'Parts Work Integration',
  7:'Timeline Therapy & Reprocessing', 8:'Clearing Old Programming', 9:'Honoring What Was',
  10:'Releasing Expectations & Ritual Goodbye', 11:'Final Akashic Clearing', 12:'Emergence & Integration'
};

function getSessionName(week) {
  return state.config.sessionNames[week] || DEFAULT_SESSION_NAMES[week] || 'Week ' + week;
}

function getWeekCount() {
  return state.config.weekCount || 12;
}


/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
const HOME_AFFIRMATIONS = [
  "Your presence is the medicine. Everything else flows from here.",
  "Trust the pace of your practice. You are exactly where you need to be.",
  "Every client who finds you was meant to. Breathe and begin.",
  "You hold space beautifully. Let me handle the rest.",
  "Grounded in purpose, guided by love. Let's get to work.",
  "The work you do ripples outward in ways you'll never fully see.",
  "One breath, one client, one moment at a time.",
  "You are the calm at the center. I'll keep everything organized around you."
];

document.addEventListener('DOMContentLoaded', () => {
  // Set home greeting + affirmation immediately (before API calls)
  setHomeGreeting();

  Promise.all([loadTemplates(), loadConfig()]).then(() => {
    const firstName = (state.config.practitionerName || 'Carlie').split(',')[0].split(' ')[0];
    // Update greeting with config name
    document.getElementById('homeGreeting').textContent = 'Good ' + getTimeGreeting() + ', ' + firstName;
    loadClients().then(() => {
      appendAIMessage('Good ' + getTimeGreeting() + ', ' + firstName + '. Select a client from the sidebar, or ask me anything.');
    });
  });
  renderQuickActions();
  initVoiceInput();
});

function setHomeGreeting() {
  var el = document.getElementById('homeGreeting');
  if (el) el.textContent = 'Good ' + getTimeGreeting();
  var aff = document.getElementById('homeAffirmation');
  if (aff) aff.textContent = HOME_AFFIRMATIONS[Math.floor(Math.random() * HOME_AFFIRMATIONS.length)];
}

async function loadTemplates() {
  try {
    const data = await apiCall({ action: 'getTemplates' });
    state.templates = data || [];
  } catch (e) {
    state.templates = [];
  }
}

async function loadConfig() {
  try {
    const data = await apiCall({ action: 'getConfig' });
    if (data) {
      state.config = Object.assign(state.config, data);
      // Update dynamic UI elements
      const aiName = state.config.aiName || 'Willow';
      const practiceName = state.config.practiceName || 'Haven, The Awakening Doula';
      document.title = aiName + ' | ' + practiceName;
      const brand = document.getElementById('sidebarBrand');
      if (brand) brand.textContent = practiceName;
      const headerName = document.getElementById('headerName');
      if (headerName) headerName.textContent = aiName;
      const headerSub = document.getElementById('headerSubtitle');
      if (headerSub) headerSub.textContent = practiceName.replace(',', ' ·');
      const homeTitle = document.getElementById('homeTitle');
      if (homeTitle) homeTitle.textContent = 'Welcome';
      const chatField = document.getElementById('chatInputField');
      if (chatField) chatField.placeholder = 'Ask ' + aiName + ' anything...';
    }
  } catch (e) {
    // Defaults already set in state
  }
}

function isTemplateActive(category, label) {
  if (state.templates.length === 0) return true; // No registry yet — assume all active (backward compat)
  const tmpl = state.templates.find(t => t.category === category && t.label === label);
  return tmpl ? tmpl.status === 'Active' : true; // Unknown templates assumed active (hard-coded fallback)
}

async function loadClients() {
  try {
    const data = await apiCall({ action: 'getClients' });
    state.clients = data || [];
    renderClientList(state.clients);
    updateStats();
  } catch (e) {
    document.getElementById('clientList').innerHTML =
      '<div style="padding:14px;font-size:12px;color:var(--muted)">Couldn\'t load clients. Please refresh.</div>';
    appendAIMessage('I had trouble loading your client list. Please refresh the page.');
  }
}

function getTimeGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}


/* ═══════════════════════════════════════════════
   CLIENT LIST
═══════════════════════════════════════════════ */
function renderClientList(clients) {
  const list = document.getElementById('clientList');
  if (!clients || !clients.length) {
    list.innerHTML = '<div style="padding:14px;font-size:13px;color:var(--muted);text-align:center">No clients yet.<br>Create your first client below.</div>';
    return;
  }
  list.innerHTML = clients.map(c => clientCardHTML(c)).join('');
}

function clientCardHTML(c) {
  const t = (c.clientType || '').toLowerCase();
  const typeClass = t.includes('akashic') ? 'badge-akashic' : t.includes('counsel') ? 'badge-counseling' : 'badge-soul';
  const typeLabel = t.includes('akashic') ? 'Akashic' : t.includes('counsel') ? 'Counseling' : 'Soul';
  const statusClass = c.status === 'Active' ? 'badge-active' : 'badge-complete';
  const weekText = c.currentWeek ? `<span class="week-pill">Wk ${c.currentWeek}</span>` : '';
  const isActive = state.activeClient && state.activeClient.name === c.name;

  return `<div class="client-card ${isActive ? 'active' : ''}" onclick="selectClientByName('${escAttr(c.name)}')">
    <div class="client-card-name">${escHtml(c.name)}</div>
    <div class="client-card-meta">
      <span class="badge ${typeClass}">${typeLabel}</span>
      <span class="badge ${statusClass}">${c.status}</span>
      ${weekText}
    </div>
  </div>`;
}

function filterClients() {
  const q = document.getElementById('clientSearch').value.toLowerCase();
  renderClientList(state.clients.filter(c => c.name.toLowerCase().includes(q)));
}

function updateStats() {
  const active = state.clients.filter(c => c.status === 'Active').length;
  const complete = state.clients.filter(c => c.status !== 'Active').length;
  document.getElementById('clientStats').textContent = active + ' active · ' + complete + ' complete';
}

function selectClientByName(name) {
  const client = state.clients.find(c => c.name === name);
  if (client) selectClient(client);
}

function selectClient(client) {
  state.activeClient = client;

  // Update header pill
  const pill = document.getElementById('activeClientPill');
  pill.textContent = client.name;
  pill.classList.remove('no-client');

  renderClientList(state.clients);
  renderQuickActions();
  if (window.innerWidth <= 680) closeSidebar();

  const t = (client.clientType || '').toLowerCase();
  const typeLabel = t.includes('soul') ? `Soul Emergence (Week ${client.currentWeek || 1} of ${getWeekCount()})`
                  : (client.clientType || client.serviceType || 'client');
  appendAIMessage(`Switched to ${client.name} — ${typeLabel}.\n\nWhat would you like to do?`);
}


/* ═══════════════════════════════════════════════
   HOME / DASHBOARD RESET
═══════════════════════════════════════════════ */
function goHome() {
  // Deselect client
  state.activeClient = null;
  state.conversationHistory = [];

  // Reset header pill
  const pill = document.getElementById('activeClientPill');
  pill.textContent = 'Select a client';
  pill.classList.add('no-client');

  // Clear chat and restore home state
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = '';
  const home = document.createElement('div');
  home.className = 'home-state';
  home.id = 'homeState';
  home.innerHTML = `
    <div class="home-mark"><svg viewBox="0 0 100 70" width="100" height="70"><path d="M50 8C42 14 30 20 24 55" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.55" stroke-linecap="round"/><path d="M50 8C45 16 38 25 36 58" stroke="currentColor" stroke-width="1" fill="none" opacity="0.65" stroke-linecap="round"/><path d="M50 8C48 18 44 30 43 62" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.45" stroke-linecap="round"/><path d="M50 8C52 18 56 30 57 62" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.45" stroke-linecap="round"/><path d="M50 8C55 16 62 25 64 58" stroke="currentColor" stroke-width="1" fill="none" opacity="0.65" stroke-linecap="round"/><path d="M50 8C58 14 70 20 76 55" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.55" stroke-linecap="round"/></svg></div>
    <div class="home-greeting" id="homeGreeting">Good ${getTimeGreeting()}</div>
    <div class="home-affirmation" id="homeAffirmation">${HOME_AFFIRMATIONS[Math.floor(Math.random() * HOME_AFFIRMATIONS.length)]}</div>
    <div class="home-grid">
      <button class="home-grid-btn" onclick="openNewClientModal()">
        <span class="icon">+</span><span class="label">New Client</span>
      </button>
      <button class="home-grid-btn" onclick="homeAction('add_lead')">
        <span class="icon">&hearts;</span><span class="label">Add Lead</span>
      </button>
      <button class="home-grid-btn" onclick="homeAction('add_session')">
        <span class="icon">&middot;</span><span class="label">Schedule</span>
      </button>
      <button class="home-grid-btn" onclick="openSheet('home-marketing')">
        <span class="icon">&raquo;</span><span class="label">Marketing</span>
      </button>
    </div>`;
  chatArea.appendChild(home);

  // Update greeting with config name
  const firstName = (state.config.practitionerName || 'Carlie').split(',')[0].split(' ')[0];
  document.getElementById('homeGreeting').textContent = 'Good ' + getTimeGreeting() + ', ' + firstName;

  renderClientList(state.clients);
  renderQuickActions();
  closeSidebar();
}


/* ═══════════════════════════════════════════════
   SIDEBAR TOGGLE
═══════════════════════════════════════════════ */
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function closeSidebar()  { document.getElementById('sidebar').classList.remove('open'); }


/* ═══════════════════════════════════════════════
   QUICK ACTIONS — adapts by state
═══════════════════════════════════════════════ */
function renderQuickActions() {
  const el = document.getElementById('quickActions');
  if (state.activeClient) {
    el.innerHTML = `
      <div class="action-chip" onclick="openSheet('documents')">Documents</div>
      <div class="action-chip" onclick="openSheet('onboarding')">Onboarding</div>
      <div class="action-chip" onclick="openSheet('scheduling')">Schedule</div>
      <div class="action-chip" onclick="openSheet('financial')">Financial</div>
      <div class="action-chip" onclick="openSheet('emails')">Emails</div>
      <div class="action-chip" onclick="openSheet('utilities')">More</div>
    `;
  } else {
    el.innerHTML = `
      <div class="action-chip" onclick="openSheet('home-marketing')">Marketing</div>
      <div class="action-chip" onclick="openSheet('home-leads')">Leads</div>
      <div class="action-chip" onclick="openSheet('home-templates')">Templates</div>
      <div class="action-chip" onclick="homeAction('refresh_dashboard')">Dashboard</div>
    `;
  }
}


/* ═══════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════ */
function handleInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sendMessage(overrideText) {
  const input = document.getElementById('chatInput');
  const text = overrideText || input.value.trim();
  if (!text || state.isLoading) return;

  input.value = '';
  input.style.height = 'auto';

  // Remove home state if present
  const homeEl = document.getElementById('homeState');
  if (homeEl) homeEl.remove();

  appendUserMessage(text);
  showTyping();
  state.isLoading = true;

  try {
    const result = await apiCall({
      action: 'chat',
      message: text,
      clientName: state.activeClient ? state.activeClient.name : null,
      history: state.conversationHistory.slice(-20)
    });

    hideTyping();

    if (result && result.reply) {
      appendAIMessage(result.reply);
      state.conversationHistory.push(
        { role: 'user', content: text },
        { role: 'assistant', content: result.reply }
      );
      if (result.actions && result.actions.length > 0) {
        loadClients(); // Refresh sidebar if data changed
      }
    } else {
      appendAIMessage('Something went wrong. Please try again.');
    }
  } catch (err) {
    hideTyping();
    appendAIMessage('I had trouble connecting. Please check your connection and try again.');
    console.error(err);
  }

  state.isLoading = false;
}

function appendUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'message-row user';
  row.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <div class="msg-bubble">${escHtml(text)}</div>
      <div class="msg-time">${formatTime(new Date())}</div>
    </div>`;
  getChatArea().appendChild(row);
  scrollToBottom();
}

function appendAIMessage(text) {
  const row = document.createElement('div');
  row.className = 'message-row ai';
  const initial = (state.config.aiName || 'Willow').charAt(0);
  row.innerHTML = `
    <div class="msg-avatar">${initial}</div>
    <div style="display:flex;flex-direction:column;gap:2px;min-width:0">
      <div class="msg-bubble">${renderMarkdown(text)}</div>
      <div class="msg-time">${formatTime(new Date())}</div>
    </div>`;
  getChatArea().appendChild(row);
  scrollToBottom();
}

let typingRow = null;
function showTyping() {
  typingRow = document.createElement('div');
  typingRow.className = 'message-row ai';
  const initial = (state.config.aiName || 'Willow').charAt(0);
  typingRow.innerHTML = `
    <div class="msg-avatar">${initial}</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  getChatArea().appendChild(typingRow);
  scrollToBottom();
}
function hideTyping() { if (typingRow) { typingRow.remove(); typingRow = null; } }

function getChatArea() { return document.getElementById('chatArea'); }
function scrollToBottom() {
  const a = document.getElementById('chatArea');
  setTimeout(() => { a.scrollTop = a.scrollHeight; }, 50);
}


/* ═══════════════════════════════════════════════
   BOTTOM SHEET
═══════════════════════════════════════════════ */
const SECTIONS = {
  /* ── Client sections ── */
  documents: {
    title: 'Documents',
    build: buildDocumentsSection
  },
  onboarding: {
    title: 'Onboarding',
    build: () => pillSection('', [
      { label: 'Send Onboarding Email', action: () => trigger('send_onboarding_email') },
      { label: 'Check Intake Status',   action: () => trigger('check_intake_status') },
      { label: 'Create Intake Doc',     action: () => trigger('create_intake_doc') }
    ])
  },
  scheduling: {
    title: 'Scheduling',
    build: () => pillSection('', [
      { label: 'Add Next Session to Calendar', action: () => trigger('add_session') },
      { label: 'Delete a Session',             action: () => trigger('delete_session') }
    ])
  },
  financial: {
    title: 'Financial',
    build: () => pillSection('', [

function openSheet(key) {
  const section = SECTIONS[key];
  if (!section) return;

  document.getElementById('sheetTitle').textContent = section.title;
  const content = document.getElementById('sheetContent');
  content.innerHTML = '';
  section.build(content);

  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('bottomSheet').classList.add('open');

  document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.action-chip').forEach(c => {
    if (c.textContent.trim().toLowerCase() === section.title.split(' ')[0].toLowerCase()) {
      c.classList.add('active');
    }
  });
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('bottomSheet').classList.remove('open');
  document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active'));
}

/* Helper: builds a flex-wrap pill grid, appends to sheetContent */
function pillSection(label, items) {
  const content = document.getElementById('sheetContent');
  const wrapper = document.createElement('div');
  wrapper.className = 'pill-section';
  if (label) {
    const lbl = document.createElement('div');
    lbl.className = 'pill-section-label';
    lbl.textContent = label;
    wrapper.appendChild(lbl);
  }
  const grid = document.createElement('div');
  grid.className = 'pill-grid';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'action-pill' + (item.gold ? ' gold' : '') + (item.disabled ? ' disabled' : '');
    btn.textContent = item.label;
    if (item.disabled) {
      btn.title = 'Template not yet wired — use Doula Tools > Manage Templates';
    } else {
      btn.onclick = () => { item.action(); };
    }
    grid.appendChild(btn);
  });
  wrapper.appendChild(grid);
  content.appendChild(wrapper);
}

/* Documents — dynamic by client type, template-aware */
function buildDocumentsSection(content) {
  const type = (state.activeClient && state.activeClient.clientType || '').toLowerCase();

  function docPill(docType) {
    const active = isTemplateActive('document', docType);
    return { label: docType, action: () => { trigger('generate_document', docType); }, disabled: !active };
  }
  function packetPill(packetType) {
    const active = isTemplateActive('packet', packetType);
    return { label: packetType, action: () => { trigger('generate_client_packet', packetType); }, disabled: !active };
  }

  // Get available doc types and packets from registry (or use defaults)
  const registryDocs = state.templates.filter(t => t.category === 'document').map(t => t.label);
  const registryPackets = state.templates.filter(t => t.category === 'packet').map(t => t.label);

  // Default doc lists per client type (used if registry is empty)
  const akashicDocs = ['Session Notes','Integration Guide','Breathwork Notes','Akashic Notes','Client Summary'];
  const counselingDocs = ['Counseling Notes','Client Homework','Client Summary'];
  const defaultPackets = ['Intro Packet','Packet 2','Packet 3'];

  // Use registry docs filtered by relevance, or defaults
  const allDocs = registryDocs.length > 0 ? registryDocs : [...akashicDocs, ...counselingDocs, 'Soul Emergence Summary'];
  const packets = registryPackets.length > 0 ? registryPackets : defaultPackets;

  if (type.includes('akashic')) {
    const docs = registryDocs.length > 0
      ? allDocs.filter(d => !d.includes('Counseling') && !d.includes('Soul Emergence'))
      : akashicDocs;
    pillSection('Generate', docs.map(d => docPill(d)));
    pillSection('Literature Packets', packets.map(p => packetPill(p)));

  } else if (type.includes('counsel')) {
    const docs = registryDocs.length > 0
      ? allDocs.filter(d => !d.includes('Akashic') && !d.includes('Breathwork') && !d.includes('Integration Guide') && !d.includes('Soul Emergence'))
      : counselingDocs;
    pillSection('Generate', docs.map(d => docPill(d)));

  } else if (type.includes('soul') || type.includes('emergence')) {
    pillSection('Documents', [
      { label: 'Create Private Journal',     action: () => trigger('create_journal') },
      { label: 'Open Journal',               action: () => trigger('get_journal_url') },
      docPill('Soul Emergence Summary'),
      docPill('Client Summary')
    ]);

    // Workbook grid — dynamic from registry
    const wSection = document.createElement('div');
    wSection.className = 'pill-section';
    wSection.innerHTML = '<div class="pill-section-label">Send Weekly Workbook</div>';
    const grid = document.createElement('div');
    grid.className = 'workbook-grid';
    const weekCount = getWeekCount();
    for (let w = 1; w <= weekCount; w++) {
      const wName = getSessionName(w);
      const wLabel = 'Week ' + w + ' - ' + wName;
      const active = isTemplateActive('workbook', wLabel);
      const btn = document.createElement('button');
      btn.className = 'workbook-btn' + (active ? '' : ' disabled');
      btn.innerHTML = `<strong>Wk ${w}</strong>${wName}`;
      if (active) {
        btn.onclick = () => { trigger('send_workbook', w); };
      } else {
        btn.title = 'Template not yet wired — use Doula Tools > Manage Templates';
      }
      grid.appendChild(btn);
    }
    wSection.appendChild(grid);
    document.getElementById('sheetContent').appendChild(wSection);

  } else {
    document.getElementById('sheetContent').innerHTML =
      '<div style="padding:14px;font-size:13px;color:var(--muted);text-align:center">Select a client to see their documents.</div>';
  }
}

/* ═══════════════════════════════════════════════
   AUTO-LOAD TEMPLATES
   One-click: scans Drive template folder, matches and wires everything
═══════════════════════════════════════════════ */
async function autoLoadTemplates() {
  appendAIMessage('Scanning your template folder and wiring everything up — one moment...');
  try {
    const result = await apiCall({ action: 'autoLoadTemplates' });
    if (result.error) {
      appendAIMessage('Template loading failed: ' + result.error);
      return;
    }

    let msg = '**Template Auto-Load Complete**\n\n' + result.summary + '\n\n';

    if (result.wired && result.wired.length > 0) {
      msg += '**Matched & Wired:**\n';
      result.wired.forEach(w => { msg += '- ' + w.label + ' ← *' + w.fileName + '*\n'; });
      msg += '\n';
    }

    if (result.discovered && result.discovered.length > 0) {
      msg += '**Discovered & Added:**\n';
      result.discovered.forEach(d => { msg += '- ' + d.label + ' (' + d.category + ') ← *' + d.fileName + '*\n'; });
      msg += '\n';
    }

    if (result.skipped && result.skipped.length > 0) {
      msg += '**Not matched** (wire manually via chat or Manage Templates):\n';
      result.skipped.forEach(s => { msg += '- ' + s + '\n'; });
      msg += '\n';
    }

    if (result.alreadyWired && result.alreadyWired.length > 0) {
      msg += '**Already wired** (untouched): ' + result.alreadyWired.length + ' templates\n\n';
    }

    msg += 'Total active templates: **' + result.totalInRegistry + '**';

    appendAIMessage(msg);

    // Refresh the template state so UI buttons update immediately
    await loadTemplates();
  } catch (e) {
    appendAIMessage('Template loading error: ' + e.message);
  }
}

/* ═══════════════════════════════════════════════
   NEWSLETTER PREVIEW MODAL
═══════════════════════════════════════════════ */
async function openNewsletterPreview() {
  document.getElementById('newsletterSubjectVal').textContent = 'Loading...';
  document.getElementById('newsletterBody').innerHTML =
    '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Loading preview...</div>';
  document.getElementById('newsletterModal').classList.add('open');

  try {
    /* Try google.script.run first, fall back to fetch/doPost for mobile */
    let data;
    try {
      data = await apiCall({ action: 'getNewsletterPreview' });
    } catch (runErr) {
      /* Fallback: direct POST to web app URL for mobile Safari */
      const resp = await fetch(window.location.href, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getNewsletterPreview' })
      });
      const json = await resp.json();
      data = json.data || json;
    }

    if (data && data.error) {
      document.getElementById('newsletterSubjectVal').textContent = 'Not found';
      document.getElementById('newsletterBody').innerHTML = `<div style="color:var(--muted);font-size:13px">${data.error}</div>`;
    } else if (data && (data.subject || data.body)) {
      document.getElementById('newsletterSubjectVal').textContent = data.subject || '(No subject)';
      document.getElementById('newsletterBody').innerHTML = data.body || '<em>No content found.</em>';
    } else {
      document.getElementById('newsletterSubjectVal').textContent = 'Preview unavailable';
      document.getElementById('newsletterBody').innerHTML = '<div style="color:var(--muted);font-size:13px">Could not load newsletter content. Try again or check Email_Templates sheet.</div>';
    }
  } catch (e) {
    document.getElementById('newsletterSubjectVal').textContent = 'Error';
    document.getElementById('newsletterBody').innerHTML = `<div style="color:var(--muted);font-size:13px">${e.message || 'Could not load newsletter.'}</div>`;
  }
}

function closeNewsletterModal(e) {

  document.getElementById('newsletterModal').classList.remove('open');

/* ═══════════════════════════════════════════════
   VOICE INPUT (Microphone)
═══════════════════════════════════════════════ */
let recognition = null;
let isListening = false;

function initVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return; /* Browser doesn't support it — mic stays hidden */

  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    const input = document.getElementById('chatInput');
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    /* Append to existing text (in case she typed something first) */
    const before = input.value.replace(/\s*🎙️.*$/, '');
    if (e.results[e.results.length - 1].isFinal) {
      input.value = (before ? before + ' ' : '') + transcript;
    } else {
      input.value = (before ? before + ' ' : '') + transcript + ' 🎙️';
    }
    autoResize(input);
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    /* Clean up any trailing mic indicator */
    const input = document.getElementById('chatInput');
    input.value = input.value.replace(/\s*🎙️.*$/, '');
    autoResize(input);
  };

  recognition.onerror = (e) => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      showToast('Voice input unavailable');
    }
  };

  /* Show the mic button */
  document.getElementById('micBtn').style.display = 'flex';
}

function toggleMic() {
  if (!recognition) return;
  if (isListening) {
    recognition.stop();
  } else {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    recognition.start();
  }
}


/* ═══════════════════════════════════════════════
   API
═══════════════════════════════════════════════ */
async function apiCall(payload) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(err => reject(new Error(err.message || 'Server error')))
      .handleApiCall(JSON.stringify(payload));
  });
}


/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function formatTime(d) {
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(s) {
  return String(s || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

/* Light markdown → HTML for AI messages */
function renderMarkdown(text) {
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:var(--border);padding:1px 5px;border-radius:3px;font-size:12px;font-family:monospace">$1</code>')
    .replace(/\n/g, '<br>');
}
